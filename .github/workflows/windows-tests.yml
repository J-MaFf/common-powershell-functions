name: Windows Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: [self-hosted, windows]
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # NOTE: This job validates the scripts statically only. It must NEVER
      # execute them: Clear-PrintSpooler.ps1 self-elevates via UAC and blocks
      # on Read-Host/PAUSE, and add-script-to-path.ps1 permanently modifies
      # the PATH environment variable on the runner.

      - name: Parse-check all PowerShell scripts
        run: |
          $scripts = Get-ChildItem -Path . -Recurse -Include *.ps1, *.psm1 -File |
              Where-Object { $_.FullName -notmatch '[\\/]\.git([\\/]|$)' }
          if (-not $scripts) {
              Write-Host 'No PowerShell scripts found to parse-check.'
              exit 0
          }
          $failed = $false
          foreach ($script in $scripts) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  $script.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
              if ($parseErrors.Count -gt 0) {
                  $failed = $true
                  Write-Host "PARSE ERRORS: $($script.FullName)"
                  foreach ($e in $parseErrors) {
                      Write-Host ("  line {0}: {1}" -f $e.Extent.StartLineNumber, $e.Message)
                  }
              }
              else {
                  Write-Host "OK: $($script.FullName)"
              }
          }
          if ($failed) {
              throw 'One or more PowerShell scripts failed to parse.'
          }

      - name: Run PSScriptAnalyzer (fail on Error severity only)
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Write-Host 'Installing PSScriptAnalyzer...'
              Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          }
          Import-Module PSScriptAnalyzer
          $results = @(Invoke-ScriptAnalyzer -Path . -Recurse)
          if ($results.Count -gt 0) {
              $results |
                  Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize |
                  Out-String -Width 200 |
                  Write-Host
          }
          $errorFindings = @($results | Where-Object { $_.Severity -eq 'Error' })
          $warningFindings = @($results | Where-Object { $_.Severity -eq 'Warning' })
          Write-Host ("PSScriptAnalyzer: {0} error(s), {1} warning(s)." -f `
              $errorFindings.Count, $warningFindings.Count)
          if ($warningFindings.Count -gt 0) {
              Write-Host 'Warnings are reported above but do not fail the build.'
          }
          if ($errorFindings.Count -gt 0) {
              throw "PSScriptAnalyzer found $($errorFindings.Count) error-severity finding(s)."
          }
